services:
  postgres:
    image: postgres:18
    container_name: myapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: myapi_db
      POSTGRES_USER: myapi_user
      POSTGRES_PASSWORD: myapi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  seq:
    image: datalust/seq
    container_name: myapi-seq
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=YourStrongPassword
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
volumes:
  postgres_data:
  seq_data: